<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pool-Pro.uk</title>
    <meta name="description" content="Pool-Pro.uk is the ultimate digital pool scoreboard and professional tournament manager. Track frames, scores, and shot clocks for doubles or group pool matches with ease." />
    <meta name="keywords" content="Pool, Pool app, pool-pro, poolpro, pool-pro.uk, poolpro.uk, score board, best pool scor, scoreboard, tournament, billiards tracker, snooker score, match timer" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pool-pro.uk/" />
    <meta property="og:title" content="Pool-Pro | Professional Digital Pool Scoreboard" />
    <meta property="og:description" content="The ultimate digital tool for tracking pool matches, frame scores, and tournament progress. Optimized for all devices." />
    <meta property="og:image" content="/icon-512x512.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://pool-pro.uk/" />
    <meta property="twitter:title" content="Pool-Pro | Professional Digital Pool Scoreboard" />
    <meta property="twitter:description" content="The ultimate digital tool for tracking pool matches, frame scores, and tournament progress. Optimized for all devices." />
    <meta property="twitter:image" content="/icon-512x512.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Pool-Pro",
        "url": "https://pool-pro.uk",
        "description": "A professional digital scoreboard and tournament manager for Pool and Billiards.",
        "applicationCategory": "SportsApplication",
        "operatingSystem": "All",
        "offers": {
          "@type": "Offer",
          "price": "0"
        },
        "keywords": "Pool, Scoreboard, Tournament, Billiards, App"
      }
    </script>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="manifest" href="manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#000000" />
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js').catch(err => {
            console.log('Service worker registration failed: ', err);
          });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/main.tsx"></script>
  </body>
</html>
